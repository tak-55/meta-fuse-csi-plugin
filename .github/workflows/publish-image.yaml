name: "Publish Container Image"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Compute image tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "stagingversion=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "push_latest=true" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "stagingversion=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "push_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "stagingversion=${GITHUB_REF_NAME}-sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "push_latest=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@v3
        # buildkit requires $ACTIONS_CACHE_URL and $ACTIONS_RUNTIME_TOKEN for GHA build cache
      - name: publish image
        run: |
          make push-driver STAGINGVERSION=${{ steps.meta.outputs.stagingversion }} PUSH_LATEST=${{ steps.meta.outputs.push_latest }}
          make push-published-examples STAGINGVERSION=${{ steps.meta.outputs.stagingversion }} PUSH_LATEST=${{ steps.meta.outputs.push_latest }}
