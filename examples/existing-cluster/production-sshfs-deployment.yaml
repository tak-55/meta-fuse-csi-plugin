apiVersion: v1
kind: Secret
metadata:
  name: mfcp-prod-sshfs
type: Opaque
stringData:
  id_ed25519: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    replace-with-your-private-key
    -----END OPENSSH PRIVATE KEY-----
  known_hosts: |
    sftp.example.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIreplace-me
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mfcp-prod-sshfs-config
data:
  SSHFS_HOST: sftp.example.com
  SSHFS_PORT: "22"
  SSHFS_USER: replace-me
  SSHFS_REMOTE_PATH: /remote/export/path
  SSHFS_ARGS: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mfcp-prod-sshfs-app
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mfcp-prod-sshfs-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mfcp-prod-sshfs-app
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: prepare-fuse-dev
        image: busybox:1.36
        command: ["sh", "-c", "touch /fake-dev/fuse && chmod 0666 /fake-dev/fuse"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          privileged: false
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 64Mi
        volumeMounts:
        - name: fake-dev-fuse
          mountPath: /fake-dev
      - name: fuse-sidecar
        restartPolicy: Always
        image: ghcr.io/tak-55/meta-fuse-csi-plugin/mfcp-example-proxy-sshfs:latest
        imagePullPolicy: Always
        command: ["/bin/bash", "-lc"]
        args:
        - |
          set -euo pipefail
          known_hosts_args="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          if [ -f /ssh-config/known_hosts ]; then
            known_hosts_args="-o StrictHostKeyChecking=yes -o UserKnownHostsFile=/ssh-config/known_hosts"
          fi
          exec /usr/bin/sshfs "${SSHFS_USER}@${SSHFS_HOST}:${SSHFS_REMOTE_PATH}" /tmp -f -p "${SSHFS_PORT}" -o allow_other -o umask=000 -o IdentityFile=/ssh-config/id_ed25519 ${SSHFS_ARGS:-} ${known_hosts_args}
        env:
        - name: FUSERMOUNT3PROXY_FDPASSING_SOCKPATH
          value: /fusermount3-proxy/fuse-csi-ephemeral.sock
        envFrom:
        - configMapRef:
            name: mfcp-prod-sshfs-config
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          privileged: false
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        startupProbe:
          exec:
            command: ["sh", "-c", "mount | grep ' /data ' | grep fuse"]
          failureThreshold: 300
          periodSeconds: 1
        volumeMounts:
        - name: fuse-fd-passing
          mountPath: /fusermount3-proxy
        - name: fake-dev-fuse
          mountPath: /dev/fuse
          subPath: fuse
        - name: ssh-config
          mountPath: /ssh-config
          readOnly: true
        - name: fuse-csi-ephemeral
          mountPath: /data
          readOnly: true
          mountPropagation: HostToContainer
      containers:
      - name: app
        image: busybox:1.36
        command: ["/bin/sh", "-lc"]
        args:
        - |
          echo "Replace this container with your application."
          sleep infinity
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          privileged: false
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - name: fuse-csi-ephemeral
          mountPath: /data
          readOnly: true
          mountPropagation: HostToContainer
      volumes:
      - name: fuse-fd-passing
        emptyDir: {}
      - name: fake-dev-fuse
        emptyDir: {}
      - name: ssh-config
        secret:
          secretName: mfcp-prod-sshfs
          defaultMode: 0400
      - name: fuse-csi-ephemeral
        csi:
          driver: meta-fuse-csi-plugin.csi.storage.pfn.io
          readOnly: true
          volumeAttributes:
            fdPassingEmptyDirName: fuse-fd-passing
            fdPassingSocketName: fuse-csi-ephemeral.sock
            mountOptions: volume-mount-group=1000
