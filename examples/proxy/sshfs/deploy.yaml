apiVersion: v1
kind: Pod
metadata:
  name: mfcp-example-proxy-sshfs
  namespace: default
spec:
  terminationGracePeriodSeconds: 10
  hostUsers: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  initContainers:
  - name: prepare-fuse-dev
    image: busybox
    command: ['sh', '-c', 'touch /fake-dev/fuse && chmod 0666 /fake-dev/fuse']
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      privileged: false
    volumeMounts:
    - name: fake-dev-fuse
      mountPath: /fake-dev
  - name: starter
    restartPolicy: Always
    image: ghcr.io/tak-55/meta-fuse-csi-plugin/mfcp-example-proxy-sshfs:latest
    imagePullPolicy: Always
    env:
    - name: FUSERMOUNT3PROXY_FDPASSING_SOCKPATH
      value: "/fusermount3-proxy/fuse-csi-ephemeral.sock"
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      privileged: false
    volumeMounts:
    - name: fuse-fd-passing
      mountPath: /fusermount3-proxy
    - name: fake-dev-fuse
      mountPath: /dev/fuse
      subPath: fuse
    - name: fuse-csi-ephemeral
      mountPath: /data
      readOnly: true
      mountPropagation: HostToContainer
    startupProbe:
      exec:
        command: ['sh', '-c', 'mount | grep /data | grep fuse']
      failureThreshold: 300
      periodSeconds: 1
  containers:
  - image: busybox
    name: busybox
    command: ["sleep"]
    args: ["infinity"]
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      privileged: false
    volumeMounts:
    - name: fuse-csi-ephemeral
      mountPath: /data
      readOnly: true
      mountPropagation: HostToContainer
    - name: fuse-csi-ephemeral
      mountPath: /data-subpath
      readOnly: true
      subPath: subdir
      mountPropagation: HostToContainer
  volumes:
  - name: fuse-fd-passing
    emptyDir: {}
  - name: fake-dev-fuse
    emptyDir: {}
  - name: fuse-csi-ephemeral
    csi:
      driver: meta-fuse-csi-plugin.csi.storage.pfn.io
      readOnly: true
      volumeAttributes:
        fdPassingEmptyDirName: fuse-fd-passing
        fdPassingSocketName: fuse-csi-ephemeral.sock
